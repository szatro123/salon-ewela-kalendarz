<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalendarz Wizyt — Salon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:       #b5536a;
      --rose-light: #d4799a;
      --rose-bg:    #fdf2f5;
      --blush:      #f5dde5;
      --blush-mid:  #ecdae0;
      --cream:      #fdf8f6;
      --warm-white: #fff9f7;
      --text-dark:  #3a2030;
      --text-mid:   #7a5060;
      --text-light: #b08898;
      --border:     #e8d0d9;
      --shadow:     rgba(181, 83, 106, 0.12);
      --radius:     14px;
      --radius-sm:  8px;

      /* Day color palette — soft, elegant */
      --day-0-bg:   #d6eedc; --day-0-fg: #2d6e47;  /* free → sage green   */
      --day-1-bg:   #cfe0f5; --day-1-fg: #1a5490;  /* 1    → cornflower   */
      --day-2-bg:   #f7d6e0; --day-2-fg: #a83355;  /* 2    → blush rose   */
      --day-3-bg:   #fdf0c2; --day-3-fg: #8a6410;  /* 3    → soft amber   */
      --day-4-bg:   #f5d0d0; --day-4-fg: #9b2020;  /* 4+   → dusty red    */
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #fbecf0 0%, #f5e6ec 60%, #f0dce4 100%);
      border-bottom: 1px solid var(--blush-mid);
      padding: 18px 20px 16px;
    }
    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .salon-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-weight: 600;
      color: var(--rose);
      line-height: 1.1;
    }
    .salon-sub {
      font-size: 0.78rem;
      color: var(--text-mid);
      margin-top: 2px;
    }
    .header-add-btn {
      background: var(--rose);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0 20px;
      height: 44px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      transition: background .15s;
      flex-shrink: 0;
    }
    .header-add-btn:hover { background: #9e3f59; }
    @media (max-width: 420px) {
      .header-add-btn { padding: 0 14px; font-size: 0.82rem; height: 40px; }
      .salon-title { font-size: 1.25rem; }
      header { padding: 14px 16px 12px; }
      .date-nav { padding: 0 16px; }
      main { padding: 14px 16px 80px; }
    }

    /* ── Date nav ── */
    .date-nav {
      max-width: 680px;
      margin: 14px auto 0;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }
    .nav-btn {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-mid);
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.1rem;
      transition: border-color .15s, color .15s;
      flex-shrink: 0;
    }
    .nav-btn:hover { border-color: var(--rose-light); color: var(--rose); }
    .date-display {
      flex: 1;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 14px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-dark);
      user-select: none;
      transition: border-color .15s;
    }
    .date-display:hover { border-color: var(--rose-light); }
    .date-display svg { color: var(--rose); flex-shrink: 0; }
    .date-display span { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .today-btn {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-mid);
      padding: 0 14px;
      height: 44px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      white-space: nowrap;
      transition: border-color .15s, color .15s;
    }
    .today-btn:hover { border-color: var(--rose-light); color: var(--rose); }

    /* ── Custom calendar popup ── */
    .cal-popup {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 20px;
      right: 20px;
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(58,32,48,.15);
      padding: 16px;
      z-index: 50;
      animation: fadeDown .18s ease;
    }
    .cal-popup.open { display: block; }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-month-label {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--text-dark);
      font-weight: 600;
    }
    .cal-nav {
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      width: 30px; height: 30px;
      cursor: pointer; font-size: 0.9rem;
      color: var(--text-mid);
      display: flex; align-items: center; justify-content: center;
      transition: border-color .12s, color .12s;
    }
    .cal-nav:hover { border-color: var(--rose-light); color: var(--rose); }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-dow {
      text-align: center;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-light);
      padding: 4px 0;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .1s, box-shadow .1s;
      position: relative;
    }
    .cal-day:hover { transform: scale(1.1); box-shadow: 0 2px 8px var(--shadow); }
    .cal-day.empty { cursor: default; pointer-events: none; }
    /* Color tiers */
    .cal-day.c0 { background: var(--day-0-bg); color: var(--day-0-fg); }
    .cal-day.c1 { background: var(--day-1-bg); color: var(--day-1-fg); }
    .cal-day.c2 { background: var(--day-2-bg); color: var(--day-2-fg); }
    .cal-day.c3 { background: var(--day-3-bg); color: var(--day-3-fg); }
    .cal-day.c4 { background: var(--day-4-bg); color: var(--day-4-fg); }
    /* Today ring */
    .cal-day.is-today { border-color: var(--rose-light); }
    /* Selected */
    .cal-day.is-selected {
      background: var(--rose) !important;
      color: white !important;
      border-color: transparent;
      font-weight: 700;
    }

    /* Legend */
    .cal-legend {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--blush);
      flex-wrap: wrap;
    }
    .leg-item { display: flex; align-items: center; gap: 4px; font-size: 0.68rem; color: var(--text-mid); }
    .leg-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .leg-dot.c0 { background: var(--day-0-bg); outline: 1px solid var(--day-0-fg); }
    .leg-dot.c1 { background: var(--day-1-bg); outline: 1px solid var(--day-1-fg); }
    .leg-dot.c2 { background: var(--day-2-bg); outline: 1px solid var(--day-2-fg); }
    .leg-dot.c3 { background: var(--day-3-bg); outline: 1px solid var(--day-3-fg); }
    .leg-dot.c4 { background: var(--day-4-bg); outline: 1px solid var(--day-4-fg); }

    /* ── Main content ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 16px 20px 80px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state h3 { font-size: 1.05rem; color: var(--text-mid); margin-bottom: 6px; }
    .empty-state p { font-size: 0.85rem; }

    /* ── Appointment card ── */
    .appointment-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
      position: relative;
    }
    .appointment-card:hover { box-shadow: 0 4px 16px var(--shadow); border-color: var(--rose-light); }
    .time-col { min-width: 52px; text-align: center; }
    .appt-time { font-size: 0.95rem; font-weight: 600; color: var(--rose); line-height: 1.2; }
    .appt-duration { font-size: 0.72rem; color: var(--text-light); margin-top: 2px; }
    .card-body { flex: 1; min-width: 0; }
    .client-name { font-size: 1rem; font-weight: 600; color: var(--text-dark); }
    .service-row { font-size: 0.85rem; color: var(--text-mid); margin-top: 2px; }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .phone-tag { font-size: 0.78rem; color: var(--text-light); }
    .notes-tag { font-size: 0.78rem; color: var(--text-light); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }

    /* Status badges */
    .badge {
      display: inline-flex; align-items: center;
      font-size: 0.7rem; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .badge-scheduled { background: #e8f0fe; color: #3b5bdb; }
    .badge-confirmed { background: #d3f9d8; color: #2f7d38; }
    .badge-completed { background: #f1f3f5; color: #495057; }
    .badge-cancelled { background: #fff0f3; color: #c92a2a; }
    .badge-no_show   { background: #fff3e0; color: #e65100; }

    /* Card action buttons */
    .card-actions { display: flex; flex-direction: column; gap: 4px; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-light);
      transition: background .12s, color .12s;
      font-size: 1rem;
    }
    .icon-btn:hover { background: var(--blush); color: var(--text-dark); }
    .icon-btn.delete:hover { background: #fff0f3; color: #c92a2a; }

    /* ── Appointment modal ── */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(58, 32, 48, 0.35);
      backdrop-filter: blur(2px);
      align-items: flex-end;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: white;
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%;
      max-width: 640px;
      max-height: 92vh;
      overflow-y: auto;
      padding: 24px 20px 36px;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--text-dark);
    }
    .close-btn {
      background: var(--blush); border: none;
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 1rem; cursor: pointer; color: var(--text-mid);
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:hover { background: var(--blush-mid); }

    /* Form */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.8rem; font-weight: 500; color: var(--text-mid); }
    input, select, textarea {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      background: var(--warm-white);
      width: 100%;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--rose-light); background: white; }
    textarea { resize: vertical; min-height: 70px; }
    .error-msg { font-size: 0.78rem; color: #c92a2a; margin-top: 2px; }
    .form-actions { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel {
      background: white; border: 1px solid var(--border);
      color: var(--text-mid); border-radius: var(--radius-sm);
      padding: 10px 20px; font-size: 0.88rem; cursor: pointer;
      transition: border-color .15s;
    }
    .btn-cancel:hover { border-color: var(--rose-light); }
    .btn-save {
      background: var(--rose); color: white; border: none;
      border-radius: var(--radius-sm);
      padding: 10px 24px; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-save:hover { background: #9e3f59; }

    /* Delete confirm */
    .delete-confirm {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(58, 32, 48, 0.4);
      align-items: center; justify-content: center;
    }
    .delete-confirm.open { display: flex; }
    .delete-box {
      background: white;
      border-radius: var(--radius);
      padding: 28px 24px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      animation: popIn .2s ease;
    }
    @keyframes popIn {
      from { transform: scale(.92); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .delete-box h3 { font-size: 1.05rem; margin-bottom: 8px; }
    .delete-box p { font-size: 0.85rem; color: var(--text-mid); margin-bottom: 20px; }
    .delete-actions { display: flex; gap: 10px; justify-content: center; }
    .btn-delete {
      background: #c92a2a; color: white; border: none;
      border-radius: var(--radius-sm);
      padding: 10px 20px; font-size: 0.88rem; font-weight: 600;
      cursor: pointer;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--text-dark); color: white;
      padding: 10px 20px; border-radius: 20px;
      font-size: 0.85rem; font-weight: 500;
      opacity: 0; transition: opacity .2s;
      z-index: 300; pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #c92a2a; }

    /* Responsive */
    @media (max-width: 480px) {
      .salon-title { font-size: 1.2rem; }
      .form-grid { grid-template-columns: 1fr; }
      .header-stats { gap: 8px; }
      .stat-box { min-width: 68px; padding: 6px 10px; }
      .stat-value { font-size: 0.95rem; }
      .cal-popup { left: 0; right: 0; border-radius: var(--radius); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="salon-title">✦ Salon Piękności</div>
      <div class="salon-sub">Kalendarz wizyt</div>
    </div>
    <button class="header-add-btn" id="open-add">
      ➕ Dodaj
    </button>
  </div>
</header>

<div class="date-nav">
  <button class="nav-btn" id="prev-day" title="Poprzedni dzień">&#8249;</button>

  <div class="date-display" id="date-display-btn">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
    </svg>
    <span id="date-label">Dzisiaj</span>
  </div>

  <!-- Custom calendar popup -->
  <div class="cal-popup" id="cal-popup">
    <div class="cal-header">
      <button class="cal-nav" id="cal-prev">&#8249;</button>
      <span class="cal-month-label" id="cal-month-label"></span>
      <button class="cal-nav" id="cal-next">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-legend">
      <div class="leg-item"><div class="leg-dot c0"></div> Wolny</div>
      <div class="leg-item"><div class="leg-dot c1"></div> 1 wizyta</div>
      <div class="leg-item"><div class="leg-dot c2"></div> 2 wizyty</div>
      <div class="leg-item"><div class="leg-dot c3"></div> 3 wizyty</div>
      <div class="leg-item"><div class="leg-dot c4"></div> 4+</div>
    </div>
  </div>

  <button class="today-btn" id="go-today">Dzisiaj</button>
  <button class="nav-btn" id="next-day" title="Następny dzień">&#8250;</button>
</div>

<main id="appointments-list"></main>

<!-- Formularz wizyty -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Nowa wizyta</h2>
      <button class="close-btn" id="modal-close" aria-label="Zamknij">✕</button>
    </div>
    <form id="appt-form" novalidate>
      <div class="form-grid">
        <div class="form-group">
          <label for="f-name">Imię i nazwisko *</label>
          <input type="text" id="f-name" placeholder="np. Anna Kowalska" autocomplete="off" />
          <div class="error-msg" id="err-name"></div>
        </div>
        <div class="form-group">
          <label for="f-phone">Telefon *</label>
          <input type="tel" id="f-phone" placeholder="np. 600 123 456" />
          <div class="error-msg" id="err-phone"></div>
        </div>
        <div class="form-group full">
          <label for="f-service">Usługa *</label>
          <select id="f-service">
            <option value="">— Wybierz usługę —</option>
            <option>Strzyżenie</option>
            <option>Farbowanie</option>
            <option>Pasemka</option>
            <option>Balayage</option>
            <option>Modelowanie</option>
            <option>Przycinanie</option>
            <option>Pielęgnacja włosów</option>
            <option>Przedłużanie włosów</option>
            <option>Manicure</option>
            <option>Pedicure</option>
            <option>Zabieg na twarz</option>
            <option>Depilacja</option>
            <option>Inne</option>
          </select>
          <div class="error-msg" id="err-service"></div>
        </div>
        <div class="form-group">
          <label for="f-date">Data *</label>
          <input type="date" id="f-date" />
          <div class="error-msg" id="err-date"></div>
        </div>
        <div class="form-group">
          <label for="f-time">Godzina *</label>
          <input type="time" id="f-time" />
          <div class="error-msg" id="err-time"></div>
        </div>
        <div class="form-group">
          <label for="f-duration">Czas trwania *</label>
          <select id="f-duration">
            <option value="30">30 min</option>
            <option value="45">45 min</option>
            <option value="60" selected>1 godz.</option>
            <option value="90">1 godz. 30 min</option>
            <option value="120">2 godz.</option>
            <option value="150">2 godz. 30 min</option>
            <option value="180">3 godz.</option>
          </select>
        </div>
        <div class="form-group full">
          <label for="f-status">Status</label>
          <select id="f-status">
            <option value="scheduled">Zaplanowana</option>
            <option value="confirmed">Potwierdzona</option>
            <option value="completed">Zakończona</option>
            <option value="cancelled">Anulowana</option>
            <option value="no_show">Nieobecność</option>
          </select>
        </div>
        <div class="form-group full">
          <label for="f-notes">Uwagi</label>
          <textarea id="f-notes" placeholder="Alergie, preferencje, specjalne życzenia…"></textarea>
        </div>
      </div>
      <div class="error-msg" id="err-booking" style="text-align:center;margin-top:8px;font-size:0.85rem;"></div>
      <div class="form-actions">
        <button type="button" class="btn-cancel" id="form-cancel">Anuluj</button>
        <button type="submit" class="btn-save" id="form-save">Zapisz wizytę</button>
      </div>
    </form>
  </div>
</div>

<!-- Potwierdzenie usunięcia -->
<div class="delete-confirm" id="delete-confirm">
  <div class="delete-box">
    <h3>Usunąć wizytę?</h3>
    <p id="delete-confirm-text">Ta operacja jest nieodwracalna.</p>
    <div class="delete-actions">
      <button class="btn-cancel" id="delete-cancel">Zachowaj</button>
      <button class="btn-delete" id="delete-ok">Usuń</button>
    </div>
  </div>
</div>

<!-- Powiadomienie -->
<div class="toast" id="toast"></div>

<script>
  // ── Pamięć lokalna ────────────────────────────────────────────────────────
  const STORAGE_KEY = 'salon_appointments_v1';
  function loadAll() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  }
  function saveAll(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }

  // ── Stan aplikacji ────────────────────────────────────────────────────────
  let currentDate  = todayStr();
  let calViewYear  = new Date().getFullYear();
  let calViewMonth = new Date().getMonth(); // 0-based
  let editingId    = null;
  let deletingId   = null;
  let calOpen      = false;

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }
  function offsetDate(base, days) {
    const d = new Date(base + 'T00:00:00');
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0, 10);
  }
  function isoFromYMD(y, m, d) {
    return y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
  }

  // ── Formatowanie ──────────────────────────────────────────────────────────
  function formatDateLabel(iso) {
    const d = new Date(iso + 'T00:00:00');
    const today = todayStr();
    const opts  = { weekday: 'long', day: 'numeric', month: 'long' };
    const label = d.toLocaleDateString('pl-PL', opts);
    if (iso === todayStr())             return 'Dzisiaj — ' + label;
    if (iso === offsetDate(today,  1))  return 'Jutro — '   + label;
    if (iso === offsetDate(today, -1))  return 'Wczoraj — ' + label;
    return label;
  }
  function formatTime(t) { return t; }
  function timeToMins(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }
  function fmtDuration(mins) {
    if (mins < 60) return mins + ' min';
    const h = Math.floor(mins / 60), m = mins % 60;
    return h + ' godz.' + (m ? ' ' + m + ' min' : '');
  }

  // ── Kolory kółek w kalendarzu ─────────────────────────────────────────────
  function dayColorClass(count) {
    if (count === 0) return 'c0';
    if (count === 1) return 'c1';
    if (count === 2) return 'c2';
    if (count === 3) return 'c3';
    return 'c4';
  }

  // Zlicz wizyty per dzień dla całego miesiąca
  function countsByDate() {
    const map = {};
    for (const a of loadAll()) {
      map[a.date] = (map[a.date] || 0) + 1;
    }
    return map;
  }

  // ── Popup kalendarza ──────────────────────────────────────────────────────
  const MONTHS_PL = [
    'Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec',
    'Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'
  ];
  const DAYS_PL = ['Pn','Wt','Śr','Cz','Pt','So','Nd'];

  function buildCalendar() {
    const counts  = countsByDate();
    const today   = todayStr();
    const year    = calViewYear;
    const month   = calViewMonth;

    document.getElementById('cal-month-label').textContent =
      MONTHS_PL[month] + ' ' + year;

    // First day of month (0=Sun … 6=Sat), shift to Mon-first
    const firstDow = new Date(year, month, 1).getDay(); // 0=Sun
    const offset   = (firstDow + 6) % 7; // Mon=0 … Sun=6
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';

    // Day-of-week headers
    DAYS_PL.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    // Empty cells before day 1
    for (let i = 0; i < offset; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      grid.appendChild(el);
    }

    // Day cells
    for (let day = 1; day <= daysInMonth; day++) {
      const iso   = isoFromYMD(year, month, day);
      const count = counts[iso] || 0;
      const el    = document.createElement('div');

      let cls = 'cal-day ' + dayColorClass(count);
      if (iso === today)       cls += ' is-today';
      if (iso === currentDate) cls += ' is-selected';

      el.className   = cls;
      el.textContent = day;
      el.title       = count === 0 ? 'Brak wizyt' : count + (count === 1 ? ' wizyta' : count < 5 ? ' wizyty' : ' wizyt');

      el.addEventListener('click', () => {
        currentDate = iso;
        closeCalendar();
        render();
      });

      grid.appendChild(el);
    }
  }

  function openCalendar() {
    const d = new Date(currentDate + 'T00:00:00');
    calViewYear  = d.getFullYear();
    calViewMonth = d.getMonth();
    buildCalendar();
    document.getElementById('cal-popup').classList.add('open');
    calOpen = true;
  }
  function closeCalendar() {
    document.getElementById('cal-popup').classList.remove('open');
    calOpen = false;
  }
  function toggleCalendar() {
    calOpen ? closeCalendar() : openCalendar();
  }

  document.getElementById('date-display-btn').addEventListener('click', toggleCalendar);
  document.getElementById('cal-prev').addEventListener('click', e => {
    e.stopPropagation();
    calViewMonth--;
    if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
    buildCalendar();
  });
  document.getElementById('cal-next').addEventListener('click', e => {
    e.stopPropagation();
    calViewMonth++;
    if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
    buildCalendar();
  });

  // Close calendar when clicking outside
  document.addEventListener('click', e => {
    if (!calOpen) return;
    const popup   = document.getElementById('cal-popup');
    const trigger = document.getElementById('date-display-btn');
    if (!popup.contains(e.target) && !trigger.contains(e.target)) closeCalendar();
  });

  // ── Wyświetlanie listy ────────────────────────────────────────────────────
  function render() {
    document.getElementById('date-label').textContent = formatDateLabel(currentDate);

    const all = loadAll();
    const day = all
      .filter(a => a.date === currentDate)
      .sort((a, b) => a.time.localeCompare(b.time));

    const cntEl = document.getElementById('stat-count');
    if (cntEl) cntEl.textContent = day.length;

    const list = document.getElementById('appointments-list');
    if (day.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🌸</div>
          <h3>Brak wizyt na ten dzień</h3>
          <p>Kliknij <strong>Nowa wizyta</strong>, aby dodać pierwszą wizytę.</p>
        </div>`;
      return;
    }

    const statusLabels = {
      scheduled: 'Zaplanowana', confirmed: 'Potwierdzona',
      completed: 'Zakończona',  cancelled: 'Anulowana',  no_show: 'Nieobecność'
    };

    list.innerHTML = day.map(a => `
      <div class="appointment-card" data-id="${a.id}">
        <div class="time-col">
          <div class="appt-time">${formatTime(a.time)}</div>
          <div class="appt-duration">${fmtDuration(Number(a.duration))}</div>
        </div>
        <div class="card-body">
          <div class="client-name">${esc(a.clientName)}</div>
          <div class="service-row">${esc(a.service)}</div>
          <div class="card-meta">
            <span class="badge badge-${a.status}">${statusLabels[a.status] || a.status}</span>
            <span class="phone-tag">${esc(a.phone)}</span>
            ${a.notes ? `<span class="notes-tag" title="${esc(a.notes)}">📝 ${esc(a.notes)}</span>` : ''}
          </div>
        </div>
        <div class="card-actions">
          <button class="icon-btn edit"   data-id="${a.id}" title="Edytuj">✏️</button>
          <button class="icon-btn delete" data-id="${a.id}" title="Usuń">🗑️</button>
        </div>
      </div>`).join('');

    list.querySelectorAll('.edit').forEach(btn =>
      btn.addEventListener('click', e => { e.stopPropagation(); openEdit(btn.dataset.id); }));
    list.querySelectorAll('.delete').forEach(btn =>
      btn.addEventListener('click', e => { e.stopPropagation(); openDelete(btn.dataset.id); }));
    list.querySelectorAll('.appointment-card').forEach(card =>
      card.addEventListener('click', () => openEdit(card.dataset.id)));
  }

  function esc(s) {
    return String(s||'')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Nawigacja po datach ───────────────────────────────────────────────────
  document.getElementById('prev-day').addEventListener('click', () => {
    currentDate = offsetDate(currentDate, -1); render();
  });
  document.getElementById('next-day').addEventListener('click', () => {
    currentDate = offsetDate(currentDate,  1); render();
  });
  document.getElementById('go-today').addEventListener('click', () => {
    currentDate = todayStr(); render();
  });

  // ── Okno modalne (formularz) ──────────────────────────────────────────────
  function openAdd() {
    editingId = null;
    document.getElementById('modal-title').textContent  = 'Nowa wizyta';
    document.getElementById('form-save').textContent    = 'Zapisz wizytę';
    clearForm();
    document.getElementById('f-date').value = currentDate;
    document.getElementById('modal-backdrop').classList.add('open');
    document.getElementById('f-name').focus();
  }
  function openEdit(id) {
    const a = loadAll().find(x => x.id === id);
    if (!a) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edytuj wizytę';
    document.getElementById('form-save').textContent   = 'Zaktualizuj wizytę';
    clearErrors();
    document.getElementById('f-name').value     = a.clientName;
    document.getElementById('f-phone').value    = a.phone;
    document.getElementById('f-service').value  = a.service;
    document.getElementById('f-date').value     = a.date;
    document.getElementById('f-time').value     = a.time;
    document.getElementById('f-duration').value = String(a.duration);
    document.getElementById('f-status').value   = a.status;
    document.getElementById('f-notes').value    = a.notes || '';
    document.getElementById('modal-backdrop').classList.add('open');
    document.getElementById('f-name').focus();
  }
  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    editingId = null;
  }
  function clearForm() {
    document.getElementById('appt-form').reset();
    document.getElementById('f-duration').value = '60';
    document.getElementById('f-status').value   = 'scheduled';
    clearErrors();
  }
  function clearErrors() {
    ['name','phone','service','date','time','booking'].forEach(f => {
      const el = document.getElementById('err-'+f); if (el) el.textContent = '';
    });
  }

  document.getElementById('open-add').addEventListener('click', openAdd);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('form-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // ── Zapis formularza ──────────────────────────────────────────────────────
  document.getElementById('appt-form').addEventListener('submit', e => {
    e.preventDefault();
    clearErrors();

    const name     = document.getElementById('f-name').value.trim();
    const phone    = document.getElementById('f-phone').value.trim();
    const service  = document.getElementById('f-service').value;
    const date     = document.getElementById('f-date').value;
    const time     = document.getElementById('f-time').value;
    const duration = parseInt(document.getElementById('f-duration').value, 10);
    const status   = document.getElementById('f-status').value;
    const notes    = document.getElementById('f-notes').value.trim();

    let valid = true;
    if (!name)                     { document.getElementById('err-name').textContent    = 'Pole wymagane'; valid = false; }
    if (!phone)                    { document.getElementById('err-phone').textContent   = 'Pole wymagane'; valid = false; }
    if (!service)                  { document.getElementById('err-service').textContent = 'Wybierz usługę'; valid = false; }
    if (!date)                     { document.getElementById('err-date').textContent    = 'Pole wymagane'; valid = false; }
    if (!time)                     { document.getElementById('err-time').textContent    = 'Pole wymagane'; valid = false; }
    if (!valid) return;

    // Sprawdzenie podwójnej rezerwacji
    const all      = loadAll();
    const newStart = timeToMins(time);
    const newEnd   = newStart + duration;
    const conflict = all.find(a => {
      if (a.date !== date || a.id === editingId) return false;
      if (['cancelled','no_show'].includes(a.status)) return false;
      const s = timeToMins(a.time), en = s + Number(a.duration);
      return newStart < en && newEnd > s;
    });
    if (conflict) {
      document.getElementById('err-booking').textContent =
        `⚠️ Godzina nakłada się na wizytę klientki ${conflict.clientName} (${conflict.service}) o ${formatTime(conflict.time)}.`;
      return;
    }

    if (editingId) {
      const idx = all.findIndex(x => x.id === editingId);
      if (idx !== -1) {
        all[idx] = { ...all[idx], clientName:name, phone, service, date, time, duration, notes, status };
        saveAll(all);
        toast('Wizyta zaktualizowana ✓');
      }
    } else {
      all.push({
        id: 'a' + Date.now() + Math.random().toString(36).slice(2,6),
        clientName: name, phone, service, date, time, duration, notes, status
      });
      saveAll(all);
      toast('Wizyta zapisana ✓');
    }

    closeModal();
    currentDate = date;
    render();
  });

  // ── Usuwanie wizyty ───────────────────────────────────────────────────────
  function openDelete(id) {
    const a = loadAll().find(x => x.id === id);
    if (!a) return;
    deletingId = id;
    document.getElementById('delete-confirm-text').textContent =
      `Usunąć wizytę klientki ${a.clientName} (${a.service}) o godz. ${formatTime(a.time)}?`;
    document.getElementById('delete-confirm').classList.add('open');
  }
  document.getElementById('delete-cancel').addEventListener('click', () => {
    document.getElementById('delete-confirm').classList.remove('open');
    deletingId = null;
  });
  document.getElementById('delete-ok').addEventListener('click', () => {
    if (!deletingId) return;
    saveAll(loadAll().filter(a => a.id !== deletingId));
    toast('Wizyta usunięta');
    deletingId = null;
    document.getElementById('delete-confirm').classList.remove('open');
    render();
  });

  // ── Powiadomienie ─────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'toast show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
  }

  // ── Skróty klawiszowe ─────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeModal();
      closeCalendar();
      document.getElementById('delete-confirm').classList.remove('open');
    }
  });

  // ── Start ─────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
